name: Bump Helm chart

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 6"

jobs:
  bump-chart:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Bump chart
        uses: Scalified/helm-chart-bump-action@v2
        with:
          token: "${{ secrets.GH_TOKEN }}"
          dockerhub-repository: sonarqube
          chart-file-path: charts/sonarqube/Chart.yaml
          docker-image-tag-pattern: '^v?[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+-community$'
